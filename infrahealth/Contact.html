<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>InfraHealth · contact</title>
    <!-- tailwind + lucide + aos (same as main platform) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --brand-lime: #a3e635; --obsidian: #121212; --soft-bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--soft-bg);
            color: var(--obsidian);
            overflow-x: hidden;
            scroll-behavior: smooth;
            letter-spacing: -0.02em;
        }

        /* navbar – identical to main platform (with mobile fix) */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 8px 16px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            width: fit-content;
            max-width: 95%;
        }
        .navbar-logo {
            display: flex;
            align-items: center;
            padding-left: 8px;
            flex-shrink: 0;
        }
        .navbar-logo img {
            height: 32px;
            width: auto;
            object-fit: contain;
        }
        .navbar-logo .logo-fallback {
            font-weight: 800;
            font-size: 1.2rem;
            color: #1e293b;
            letter-spacing: -0.02em;
            white-space: nowrap;
        }
        .navbar-logo .logo-fallback span { color: var(--brand-lime); }
        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f1f4f9;
            padding: 4px;
            border-radius: 60px;
            flex-wrap: wrap;
        }
        .nav-link {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            padding: 8px 24px;
            border-radius: 40px;
            color: #475569;
            transition: all 0.2s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.7);
            color: #0f172a;
        }
        .nav-link.active {
            background: var(--obsidian);
            color: white;
            box-shadow: 0 4px 10px -2px rgba(0,0,0,0.2);
        }

        /* page header */
        .page-header {
            padding-top: 140px;
            padding-bottom: 40px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .page-header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        .page-header p {
            font-size: 1.2rem;
            color: #64748b;
            margin-top: 1rem;
        }

        /* calendly container – styled like a platform card */
        .calendly-wrapper {
            max-width: 1000px;
            margin: 0 auto 80px;
            padding: 0 24px;
        }
        .calendly-card {
            background: white;
            border-radius: 48px;
            border: 1px solid #f0f3f7;
            padding: 40px;
            box-shadow: 0 30px 50px -30px #cbd5e1;
        }
        .calendly-inline-widget {
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #edf2f7;
        }

        /* footer same as main */
        footer {
            border-top: 1px solid #f1f5f9;
            background: white;
            text-align: center;
            padding: 60px 24px;
        }
        .footer-note {
            font-size: 9px;
            color: #cbd5e1;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5em;
            margin-top: 40px;
        }

        /* Mobile styles - ensure logo always visible */
        @media (max-width: 640px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
                padding: 8px 12px;
            }
            .navbar-logo {
                width: 100%;
                justify-content: center;
                padding-left: 0;
                margin-bottom: 4px;
            }
            .navbar-logo img {
                height: 28px;
            }
            .navbar-nav {
                width: 100%;
                justify-content: center;
            }
            .nav-link {
                padding: 6px 16px;
                font-size: 12px;
            }
            .page-header h1 { font-size: 2.5rem; }
            .calendly-card { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- ===== NAVBAR (identical to main platform, Contact active) ===== -->
<div class="navbar">
    <div class="navbar-logo">
        <img src="images/logo.png" alt="InfraHealth" onerror="this.style.display='none'; this.parentElement.innerHTML+='<span class=\'logo-fallback\'>Infra<span>Health</span></span>';">
        <span class="logo-fallback" style="display: none;">Infra<span>Health</span></span>
    </div>
    <div class="navbar-nav">
        <a href="index.html" class="nav-link">Platform</a>
        <a href="contact.html" class="nav-link active">Contact</a>
    </div>
</div>

<!-- ===== PAGE HEADER (consistent with platform tone) ===== -->
<div class="page-header" data-aos="fade-up">
    <h1>Schedule a conversation</h1>
    <p>Discuss how InfraHealth can support your organization's coordination needs. Choose a time that works for you.</p>
</div>

<!-- ===== CALENDLY EMBED (styled as a platform card) ===== -->
<div class="calendly-wrapper" data-aos="fade-up" data-aos-delay="100">
    <div class="calendly-card">
        <!-- Calendly inline widget begin -->
        <div class="calendly-inline-widget" data-url="https://calendly.com/mhaseebawan1414?hide_landing_page_details=1&hide_gdpr_banner=1" style="min-width:320px;height:700px;"></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        <!-- Calendly inline widget end -->
    </div>
</div>

<!-- ===== ADDITIONAL CONTACT INFO (subtle, optional) ===== -->
<div class="text-center pb-16 px-6 text-slate-400 text-sm" data-aos="fade-up">
    <p class="flex items-center justify-center gap-2"><i data-lucide="mail" class="w-4 h-4"></i> hello@infrahealth.com</p>
    <p class="mt-2">Prefer email? We typically respond within one business day.</p>
</div>

<!-- ===== FOOTER (exactly like main platform) ===== -->
<footer>
    <button class="bg-black text-white px-12 py-5 rounded-full font-extrabold text-lg hover:bg-lime-500 transition" onclick="window.location.href='contact.html';">Contact</button>
    <p class="footer-note">InfraHealth © 2026</p>
</footer>

<!-- AOS and lucide -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    lucide.createIcons();
    AOS.init({ duration: 1000, once: true });
</script>
</body>
</html>
